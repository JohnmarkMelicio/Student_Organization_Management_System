<p-card class="payment-container">

  <!-- HEADER -->
  <ng-template pTemplate="title">
    <div class="header">
      <div>
        <h2>Payment Management</h2>
        <span>Manage student payments and transactions</span>
      </div>
    </div>
  </ng-template>

  <!-- FORM -->
  <div class="payment-form" *ngIf="isAdmin">

    <p-select
      [options]="[{label:'USG Fee',value:'USG'},{label:'Event',value:'Event'}]"
      [(ngModel)]="newPayment.type"
      placeholder="Payment Type">
    </p-select>

    <p-select *ngIf="newPayment.type === 'Event'"
      [options]="events"
      optionLabel="name"
      optionValue="id"
      [(ngModel)]="newPayment.eventId"
      placeholder="Select Event">
    </p-select>

    <input pInputText
      placeholder="Student ID"
      [(ngModel)]="newPayment.studentId"
      (blur)="fetchStudent()">

    <input pInputText
      type="number"
      placeholder="Amount"
      [(ngModel)]="newPayment.amount">

    <p-select
      [options]="[
        {label:'Cash',value:'Cash'},
        {label:'GCash',value:'GCash'},
        {label:'Bank Transfer',value:'Bank Transfer'}
      ]"
      [(ngModel)]="newPayment.paymentMethod"
      placeholder="Payment Method">
    </p-select>

    <button pButton
      label="Add Payment"
      icon="pi pi-plus"
      class="add-btn"
      (click)="addPayment()">
    </button>

  </div>

  <!-- FILTER -->
  <div class="payment-filter">

    <button pButton
      label="USG"
      class="filter-btn"
      [class.active]="viewMode === 'USG'"
      (click)="viewMode='USG'; applyFilters()">
    </button>

    <button pButton
      label="Event"
      class="filter-btn"
      [class.active]="viewMode === 'Event'"
      (click)="viewMode='Event'; applyFilters()">
    </button>

    <p-select *ngIf="viewMode === 'Event'"
      [options]="events"
      optionLabel="name"
      optionValue="id"
      [(ngModel)]="selectedEventId"
      (onChange)="onEventChange()"
      placeholder="Filter Event">
    </p-select>

  </div>

  <!-- SEARCH -->
  <div class="search-wrapper">
    <i class="pi pi-search"></i>
    <input pInputText
      placeholder="Search payments..."
      [(ngModel)]="searchText"
      (input)="searchPayments()">
  </div>

  <!-- TABLE -->
  <p-table
    [value]="viewMode === 'USG' ? filteredUSGPayments : filteredEventPayments"
    [paginator]="true"
    [rows]="8"
    [responsiveLayout]="'scroll'"
    class="custom-table">

    <!-- HEADER -->
    <ng-template pTemplate="header">
      <tr>
        <th *ngIf="viewMode==='Event'">Event</th>
        <th>Student ID</th>
        <th>Name</th>
        <th>Program</th>
        <th>Amount</th>
        <th>Method</th>
        <th *ngIf="isAdmin">Action</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-pay>
  <tr [ngClass]="{'editing-row': editingId===pay.id}">

    <td *ngIf="viewMode==='Event'">
      {{ getEventName(pay.eventId) }}
    </td>

    <!-- STUDENT ID -->
    <td>
      <input *ngIf="editingId===pay.id"
        pInputText
        class="edit-input"
        [(ngModel)]="pay.studentId">

      <span *ngIf="editingId!==pay.id">
        {{ pay.studentId }}
      </span>
    </td>

    <!-- NAME -->
    <td>
      <input *ngIf="editingId===pay.id"
        pInputText
        class="edit-input"
        [(ngModel)]="pay.name">

      <span *ngIf="editingId!==pay.id">
        {{ pay.name }}
      </span>
    </td>

    <!-- PROGRAM -->
    <td>
      <input *ngIf="editingId===pay.id"
        pInputText
        class="edit-input"
        [(ngModel)]="pay.program">

      <span *ngIf="editingId!==pay.id">
        {{ pay.program }}
      </span>
    </td>

    <!-- AMOUNT -->
    <td>
      <input *ngIf="editingId===pay.id"
        pInputText
        type="number"
        class="edit-input"
        [(ngModel)]="pay.amount">

      <span *ngIf="editingId!==pay.id">
        ₱{{ pay.amount }}
      </span>
    </td>

    <!-- METHOD -->
    <td>
      <p-select *ngIf="editingId===pay.id"
        [options]="[
          {label:'Cash',value:'Cash'},
          {label:'GCash',value:'GCash'},
          {label:'Bank Transfer',value:'Bank Transfer'}
        ]"
        [(ngModel)]="pay.paymentMethod"
        class="edit-select">
      </p-select>

      <span *ngIf="editingId!==pay.id">
        {{ pay.paymentMethod }}
      </span>
    </td>

    <!-- ACTION -->
    <td *ngIf="isAdmin" class="actions">

      <!-- NORMAL -->
      <ng-container *ngIf="editingId!==pay.id">

        <button pButton icon="pi pi-pencil"
          class="p-button-rounded p-button-text p-button-info"
          (click)="editPayment(pay)">
        </button>

        <button pButton icon="pi pi-trash"
          class="p-button-rounded p-button-text p-button-danger"
          (click)="deletePayment(pay.id)">
        </button>

      </ng-container>

      <!-- EDIT MODE (LIKE ATTENDANCE) -->
      <ng-container *ngIf="editingId===pay.id">

        <button pButton
          label="Save"
          icon="pi pi-check"
          class="p-button-success p-button-sm"
          (click)="savePayment(pay)">
        </button>

        <button pButton
          label="Cancel"
          icon="pi pi-times"
          class="p-button-secondary p-button-sm"
          (click)="cancelEdit()">
        </button>

      </ng-container>

    </td>

  </tr>
</ng-template>
  </p-table>

</p-card>
