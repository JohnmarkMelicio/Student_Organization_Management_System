<p-card class="create-student-container">

  <ng-template pTemplate="title">
    <div class="header">
      <h2>Create Student Account</h2>
      <span>Register a new student user</span>
    </div>
  </ng-template>

  <form #studentForm="ngForm" (ngSubmit)="createStudent(studentForm)">

    <!-- STUDENT ID -->
    <div class="form-group">
      <label>Student ID</label>
      <input pInputText
        type="text"
        name="studentID"
        [(ngModel)]="studentID"
        required
        placeholder="Enter Student ID">
    </div>

    <!-- NAME ROW -->
    <div class="form-row">

      <div class="form-group">
        <label>First Name</label>
        <input pInputText
          type="text"
          name="firstName"
          [(ngModel)]="firstName"
          required
          placeholder="Enter First Name">
      </div>

      <div class="form-group">
        <label>Middle Name</label>
        <input pInputText
          type="text"
          name="middleName"
          [(ngModel)]="middleName"
          placeholder="Enter Middle Name">
      </div>

    </div>

    <!-- LAST NAME -->
    <div class="form-group">
      <label>Last Name</label>
      <input pInputText
        type="text"
        name="lastName"
        [(ngModel)]="lastName"
        required
        placeholder="Enter Last Name">
    </div>

    <!-- PROGRAM -->
    <div class="form-group">
      <label>Program</label>
      <input pInputText
        type="text"
        name="program"
        [(ngModel)]="program"
        required
        placeholder="Enter Program (e.g. BSIT)">
    </div>

    <!-- EMAIL -->
    <div class="form-group">
      <label>Email</label>
      <input pInputText
        type="email"
        name="email"
        [(ngModel)]="email"
        required
        placeholder="Enter Email">
    </div>

    <!-- PASSWORD -->
    <div class="form-group">
      <label>Password</label>
      <p-password
        name="password"
        [(ngModel)]="password"
        required
        [minlength]="6"
        [toggleMask]="true"
        placeholder="Enter Password"
        inputStyleClass="w-full">
      </p-password>
    </div>

    <!-- BUTTONS -->
    <div class="form-actions">

      <button pButton
              type="submit"
              label="Create Account"
              icon="pi pi-user-plus"
              class="primary-btn">
      </button>

      <button pButton
              type="button"
              label="Cancel"
              icon="pi pi-times"
              class="secondary-btn"
              (click)="cancel(studentForm)">
      </button>

    </div>

  </form>

</p-card>
