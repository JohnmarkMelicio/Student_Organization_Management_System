<p-card class="org-container">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h2>Organizations</h2>
      <span class="sub">Manage student organizations</span>
    </div>

    <button *ngIf="isAdmin"
            pButton
            label="Add Organization"
            icon="pi pi-plus"
            class="add-btn"
            (click)="openModal()">
    </button>
  </div>

  <!-- GRID -->
  <div class="org-grid" *ngIf="organizations.length; else emptyState">

    <div class="org-card"
         *ngFor="let org of organizations"
         (click)="openOrganization(org.id!)">

      <!-- MENU -->
      <div *ngIf="isAdmin"
           class="menu-wrapper"
           (click)="$event.stopPropagation()">

        <button pButton
                icon="pi pi-ellipsis-v"
                class="p-button-text menu-btn"
                (click)="toggleMenu(org.id!)">
        </button>

        <div class="dropdown" *ngIf="activeMenu === org.id">
          <div class="dropdown-item delete"
               (click)="deleteOrganization(org.id!)">
            <i class="pi pi-trash"></i> Delete Organization
          </div>
        </div>

      </div>

      <!-- ICON -->
      <div class="org-icon">
        <i class="pi pi-building"></i>
      </div>

      <!-- INFO -->
      <div class="org-info">
        <h3>
          {{ org.name }}
          <span class="badge">{{ org.acronym }}</span>
        </h3>

        <p>{{ org.description || 'No description available' }}</p>
      </div>

    </div>

  </div>

  <!-- EMPTY -->
  <ng-template #emptyState>
    <div class="empty">
      <i class="pi pi-folder-open"></i>
      <p>No organizations found</p>
    </div>
  </ng-template>

</p-card>


<!-- MODAL -->
<div class="modal-backdrop" *ngIf="showModal">

  <div class="modal-card">

    <div class="modal-header">
      <h3>Create Organization</h3>
      <button pButton icon="pi pi-times"
              class="p-button-text"
              (click)="closeModal()">
      </button>
    </div>

    <div class="modal-body">

      <div class="form-grid">

        <div class="form-group">
          <label>Organization Name *</label>
          <input pInputText [(ngModel)]="newOrg.name">
        </div>

        <div class="form-group">
          <label>Acronym</label>
          <input pInputText [(ngModel)]="newOrg.acronym">
        </div>

        <div class="form-group full">
          <label>Description</label>
          <textarea pInputTextarea [(ngModel)]="newOrg.description"></textarea>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input pInputText [(ngModel)]="newOrg.email">
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input pInputText [(ngModel)]="newOrg.phone">
        </div>

        <div class="form-group full">
          <label>Location</label>
          <input pInputText [(ngModel)]="newOrg.location">
        </div>

        <div class="form-group full">
          <label>Mission</label>
          <textarea pInputTextarea [(ngModel)]="newOrg.mission"></textarea>
        </div>

        <div class="form-group full">
          <label>Vision</label>
          <textarea pInputTextarea [(ngModel)]="newOrg.vision"></textarea>
        </div>

        <div class="form-group">
          <label>Facebook</label>
          <input pInputText [(ngModel)]="newOrg.social.facebook">
        </div>

        <div class="form-group">
          <label>Instagram</label>
          <input pInputText [(ngModel)]="newOrg.social.instagram">
        </div>

      </div>

    </div>

    <div class="modal-footer">

      <button pButton
              label="Cancel"
              class="secondary-btn"
              (click)="closeModal()">
      </button>

      <button pButton
              label="Create Organization"
              icon="pi pi-check"
              class="primary-btn"
              (click)="addOrganization()">
      </button>

    </div>

  </div>

</div>
