<div class="org-container">

  <div class="header">
    <div>
      <h2>Organizations</h2>
      <p class="sub">Manage student organizations</p>
    </div>

    <button *ngIf="isAdmin" class="add-btn" (click)="openModal()">
      + Add Organization
    </button>
  </div>

  <div class="org-grid" *ngIf="organizations.length; else emptyState">

    <div class="org-card"
     *ngFor="let org of organizations"
     (click)="openOrganization(org.id!)">

      <!-- 3 DOT MENU -->
      <div *ngIf="isAdmin"
        class="menu-wrapper"
        (click)="$event.stopPropagation()">

        <span class="menu-btn" (click)="toggleMenu(org.id!)">⋮</span>

        <div class="dropdown" *ngIf="activeMenu === org.id">
          <div class="dropdown-item delete"
              (click)="deleteOrganization(org.id!)">
            Delete Organization
          </div>
        </div>

      </div>

      <div class="org-icon">🏢</div>

      <div class="org-info">
        <h3>
          {{ org.name }}
          <span class="badge">{{ org.shortName }}</span>
        </h3>

        <p>{{ org.description || 'No description available' }}</p>
      </div>

    </div>
  </div>

  <ng-template #emptyState>
    <div class="empty">
      No organizations found.
    </div>
  </ng-template>

  <!-- MODAL -->
  <div class="modal-backdrop" *ngIf="showModal">

    <div class="modal-card">

      <div class="modal-header">
        <h3>Add Organization</h3>
        <span class="close" (click)="closeModal()">✕</span>
      </div>

      <div class="modal-body">

        <div class="form-grid">

          <div class="form-group">
            <label>Organization Name *</label>
            <input [(ngModel)]="newOrg.name">
          </div>

          <div class="form-group">
            <label>Acronym</label>
            <input [(ngModel)]="newOrg.shortName">
          </div>

          <div class="form-group full">
            <label>Description</label>
            <textarea [(ngModel)]="newOrg.description"></textarea>
          </div>

          <div class="form-group">
            <label>Email</label>
            <input [(ngModel)]="newOrg.email">
          </div>

          <div class="form-group">
            <label>Phone</label>
            <input [(ngModel)]="newOrg.phone">
          </div>

          <div class="form-group full">
            <label>Location</label>
            <input [(ngModel)]="newOrg.location">
          </div>

          <div class="form-group full">
            <label>Mission</label>
            <textarea [(ngModel)]="newOrg.mission"></textarea>
          </div>

          <div class="form-group full">
            <label>Vision</label>
            <textarea [(ngModel)]="newOrg.vision"></textarea>
          </div>

          <!-- ✅ SOCIAL LINKS -->
          <div class="form-group">
            <label>Facebook</label>
            <input [(ngModel)]="newOrg.social.facebook">
          </div>

          <div class="form-group">
            <label>Instagram</label>
            <input [(ngModel)]="newOrg.social.instagram">
          </div>

        </div>

      </div>

      <div class="modal-footer">
        <button class="cancel-btn" (click)="closeModal()">Cancel</button>
        <button class="save-btn" (click)="addOrganization()">
          Create Organization
        </button>
      </div>

    </div>

  </div>

</div>
