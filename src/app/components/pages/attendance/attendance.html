<p-card class="attendance-card">

  <!-- HEADER -->
  <ng-template pTemplate="title">
    <div class="header">
      <div>
        <h2>Attendance Management</h2>
        <span>Track and manage event participation</span>
      </div>
    </div>
  </ng-template>

  <!-- TOOLBAR -->
  <!-- TOOLBAR -->
<div class="toolbar">

  <div class="left">

    <p-select
      [options]="events"
      [(ngModel)]="selectedEventId"
      optionLabel="name"
      optionValue="id"
      placeholder="Select Event"
      (onChange)="loadAttendance()"
      class="field">
    </p-select>

    <ng-container *ngIf="isAdmin">

      <input pInputText
             placeholder="Student ID"
             [(ngModel)]="newRecord.studentId"
             class="field"/>

      <p-select
        [options]="statusOptions"
        [(ngModel)]="newRecord.status"
        class="field small">
      </p-select>

      <button pButton
              label="Add"
              icon="pi pi-plus"
              class="add-btn"
              (click)="addAttendance()">
      </button>

      <button pButton
        icon="pi pi-qrcode"
        label="Scan QR"
        class="qr-btn-wide"
        (click)="openScanner()">
      </button>

    </ng-container>

  </div>

</div>

<p-dialog
  [(visible)]="showScanner"
  header="Scan Student QR"
  [modal]="true"
  [style]="{ width: '380px' }"
  [draggable]="false"
  styleClass="qr-dialog"
>

  <!-- CAMERA SELECTOR -->
  <div class="camera-select-wrapper">
    <i class="pi pi-camera"></i>
    <select [(ngModel)]="currentDevice" class="camera-select">
      <option *ngFor="let d of availableDevices" [ngValue]="d">
        {{ d.label || 'Camera ' + (availableDevices.indexOf(d) + 1) }}
      </option>
    </select>
  </div>

  <!-- SCANNER -->
  <div class="scanner-container">
    <zxing-scanner
      [device]="currentDevice"
      (camerasFound)="onCamerasFound($event)"
      (scanSuccess)="onScan($event)">
    </zxing-scanner>

    <!-- 🔥 OVERLAY FRAME -->
    <div class="scan-frame"></div>
  </div>

  <!-- HINT -->
  <div class="scan-hint">
    Align QR inside the frame
  </div>

</p-dialog>

<!-- ✅ NEW SEARCH ROW -->
<div class="search-row">
  <div class="search-wrapper">
    <i class="pi pi-search"></i>
    <input pInputText
           placeholder="Search students..."
           (input)="dt.filterGlobal($event.target.value, 'contains')" />
  </div>
</div>

  <!-- TABLE -->
  <p-table
    #dt
    [value]="attendanceList"
    [paginator]="true"
    [rows]="8"
    [globalFilterFields]="['studentId','name','program']"
    class="custom-table">

    <!-- HEADER -->
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="studentId">
          Student ID
          <p-sortIcon field="studentId"></p-sortIcon>
        </th>

        <th pSortableColumn="name">
          Name
          <p-sortIcon field="name"></p-sortIcon>
        </th>

        <th>Program</th>

        <th>Status</th>

        <th pSortableColumn="datetime">
          Date
          <p-sortIcon field="datetime"></p-sortIcon>
        </th>

        <th *ngIf="isAdmin">Action</th>
      </tr>
    </ng-template>

    <!-- BODY -->
    <ng-template pTemplate="body" let-record>
      <tr>

        <!-- STUDENT ID -->
        <td class="student-id">
          <input *ngIf="editingId === record.id"
                 pInputText
                 [(ngModel)]="record.studentId" />
          <span *ngIf="editingId !== record.id">
            {{ record.studentId }}
          </span>
        </td>

        <!-- NAME -->
        <td>
          <div class="name-cell">
            <input *ngIf="editingId === record.id"
                   pInputText
                   [(ngModel)]="record.name" />
            <span *ngIf="editingId !== record.id" class="name">
              {{ record.name }}
            </span>
          </div>
        </td>

        <!-- PROGRAM -->
        <td>
          <input *ngIf="editingId === record.id"
                 pInputText
                 [(ngModel)]="record.program" />
          <span *ngIf="editingId !== record.id" class="program">
            {{ record.program }}
          </span>
        </td>

        <!-- STATUS -->
        <td>

          <p-select *ngIf="editingId === record.id"
            [options]="statusOptions"
            [(ngModel)]="record.status">
          </p-select>

          <p-tag *ngIf="editingId !== record.id"
            [value]="record.status"
            [severity]="getStatusSeverity(record.status)">
          </p-tag>

        </td>

        <!-- DATE -->
        <td class="date">
          {{ record.datetime | date:'MMM d, y, h:mm a' }}
        </td>

        <!-- ACTION -->
        <td *ngIf="isAdmin" class="actions">

          <!-- EDIT MODE -->
          <ng-container *ngIf="editingId === record.id">

            <button pButton
                    label="Save"
                    icon="pi pi-check"
                    class="p-button-sm p-button-success"
                    (click)="saveRecord(record)">
            </button>

            <button pButton
                    label="Cancel"
                    icon="pi pi-times"
                    class="p-button-sm p-button-secondary"
                    (click)="cancelEdit()">
            </button>

          </ng-container>

          <!-- NORMAL MODE -->
          <ng-container *ngIf="editingId !== record.id">

            <button pButton
                    icon="pi pi-pencil"
                    class="p-button-rounded p-button-text edit-btn"
                    (click)="editRecord(record)">
            </button>

            <button pButton
                    icon="pi pi-trash"
                    class="p-button-rounded p-button-text delete-btn"
                    (click)="deleteRecord(record.id)">
            </button>

          </ng-container>

        </td>

      </tr>
    </ng-template>

  </p-table>

</p-card>
