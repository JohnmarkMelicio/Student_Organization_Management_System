<div class="attendance-container">

  <h2>Event Attendance</h2>

  <select [(ngModel)]="selectedEventId"
          (change)="loadAttendance()">

    <option [ngValue]="null">Select Event</option>

    <option *ngFor="let event of events"
            [ngValue]="event.id">
      {{ event.name }} ({{ event.date }})
    </option>

  </select>

  <table *ngIf="attendanceList.length">

    <thead>
      <tr>
        <th>Student ID</th>
        <th>Name</th>
        <th>Program</th>
        <th>Status</th>
        <th>Date & Time</th>
        <th *ngIf="isAdmin">Action</th> <!-- ✅ HIDDEN FOR STUDENT -->
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let record of attendanceList">

        <!-- Student ID -->
        <td>
          <input *ngIf="editingId === record.id && isAdmin"
                 [(ngModel)]="record.studentId">

          <span *ngIf="editingId !== record.id || !isAdmin">
            {{ record.studentId }}
          </span>
        </td>

        <!-- Name -->
        <td>
          <input *ngIf="editingId === record.id && isAdmin"
                 [(ngModel)]="record.name">

          <span *ngIf="editingId !== record.id || !isAdmin">
            {{ record.name }}
          </span>
        </td>

        <!-- Program -->
        <td>
          <input *ngIf="editingId === record.id && isAdmin"
                 [(ngModel)]="record.program">

          <span *ngIf="editingId !== record.id || !isAdmin">
            {{ record.program }}
          </span>
        </td>

        <!-- Status -->
        <td>
          <select *ngIf="editingId === record.id && isAdmin"
                  [(ngModel)]="record.status">
            <option value="Present">Present</option>
            <option value="Absent">Absent</option>
          </select>

          <span *ngIf="editingId !== record.id || !isAdmin">
            {{ record.status }}
          </span>
        </td>

        <!-- Date -->
        <td>
          {{ record.datetime | date:'MMM d, y, h:mm a' }}
        </td>

        <!-- ACTIONS (ADMIN ONLY) -->
        <td *ngIf="isAdmin">

          <button *ngIf="editingId !== record.id"
                  (click)="editRecord(record)">
            Edit
          </button>

          <button *ngIf="editingId === record.id"
                  (click)="saveRecord(record)">
            Save
          </button>

          <button *ngIf="editingId === record.id"
                  (click)="cancelEdit()">
            Cancel
          </button>

          <button *ngIf="editingId !== record.id"
                  (click)="deleteRecord(record.id)">
            Delete
          </button>

        </td>

      </tr>

    </tbody>

  </table>

  <!-- ADD ATTENDANCE (ADMIN ONLY) -->
  <div *ngIf="isAdmin">

    <h3>Add Attendance</h3>

    <input placeholder="Student ID"
           [(ngModel)]="newRecord.studentId">

    <input placeholder="Name"
           [(ngModel)]="newRecord.name">

    <input placeholder="Program"
           [(ngModel)]="newRecord.program">

    <select [(ngModel)]="newRecord.status">
      <option value="Present">Present</option>
      <option value="Absent">Absent</option>
    </select>

    <button (click)="addAttendance()">
      Add
    </button>

  </div>

</div>
