<div class="attendance-container">

  <h2>Event Attendance</h2>

  <div class="attendance-form">

    <label>Event</label>
    <select [(ngModel)]="selectedEventId"
            (change)="loadAttendance()">
      <option [ngValue]="null">Select Event</option>
      <option *ngFor="let event of events"
              [ngValue]="event.id">
        {{ event.name }} ({{ event.date }})
      </option>
    </select>

    <ng-container *ngIf="isAdmin">

      <label>Student ID</label>
      <input placeholder="Enter Student ID"
             [(ngModel)]="newRecord.studentId">

      <label>Status</label>
      <select [(ngModel)]="newRecord.status">
        <option value="Present">Present</option>
        <option value="Absent">Absent</option>
        <option value="Late">Late</option>
      </select>

      <button (click)="addAttendance()">
        Add Attendance
      </button>

    </ng-container>

  </div>

  <!-- 🔍 SEARCH -->
  <input class="search"
         placeholder="Search attendance..."
         [(ngModel)]="searchText"
         (input)="searchAttendance()">

  <table *ngIf="selectedEventId">

    <thead>
      <tr>
        <th (click)="sortBy('studentId')">Student ID</th>
        <th (click)="sortBy('name')">Name</th>
        <th (click)="sortBy('program')">Program</th>
        <th>Status</th>
        <th (click)="sortBy('datetime')">Date & Time</th>
        <th *ngIf="isAdmin">Action</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let record of filteredAttendance">

        <td>
          <input *ngIf="editingId === record.id && isAdmin"
                 [(ngModel)]="record.studentId">
          <span *ngIf="editingId !== record.id || !isAdmin">
            {{ record.studentId }}
          </span>
        </td>

        <td>
          <input *ngIf="editingId === record.id && isAdmin"
                 [(ngModel)]="record.name">
          <span *ngIf="editingId !== record.id || !isAdmin">
            {{ record.name }}
          </span>
        </td>

        <td>
          <input *ngIf="editingId === record.id && isAdmin"
                 [(ngModel)]="record.program">
          <span *ngIf="editingId !== record.id || !isAdmin">
            {{ record.program }}
          </span>
        </td>

        <td>
          <select *ngIf="editingId === record.id && isAdmin"
                  [(ngModel)]="record.status">
            <option value="Present">Present</option>
            <option value="Absent">Absent</option>
            <option value="Late">Late</option>
          </select>

          <span *ngIf="editingId !== record.id || !isAdmin">
            {{ record.status }}
          </span>
        </td>

        <td>
          {{ record.datetime | date:'MMM d, y, h:mm a' }}
        </td>

        <td *ngIf="isAdmin">

          <button class="btn edit-btn"
                  *ngIf="editingId !== record.id"
                  (click)="editRecord(record)">
            Edit
          </button>

          <button class="btn save-btn"
                  *ngIf="editingId === record.id"
                  (click)="saveRecord(record)">
            Save
          </button>

          <button class="btn cancel-btn"
                  *ngIf="editingId === record.id"
                  (click)="cancelEdit()">
            Cancel
          </button>

          <button class="btn delete-btn"
                  *ngIf="editingId !== record.id"
                  (click)="deleteRecord(record.id)">
            Delete
          </button>

        </td>

      </tr>

    </tbody>

  </table>

</div>
