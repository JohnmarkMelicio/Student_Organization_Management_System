<p-card class="event-container">

  <!-- HEADER TOGGLE -->
  <div class="top-toggle">

    <button pButton
            label="Create Event"
            icon="pi pi-plus"
            *ngIf="isAdmin"
            [class.active]="viewMode === 'create'"
            (click)="viewMode='create'">
    </button>

    <button pButton
            label="Event List"
            icon="pi pi-list"
            [class.active]="viewMode === 'list'"
            (click)="viewMode='list'">
    </button>

  </div>

  <!-- CREATE FORM -->
  <div *ngIf="viewMode === 'create' && isAdmin" class="event-form">

    <input pInputText [(ngModel)]="newEvent.name" placeholder="Event Name">

    <input pInputText type="date" [(ngModel)]="newEvent.date">

    <input pInputText [(ngModel)]="newEvent.location" placeholder="Location">

    <!-- ✅ USING SELECT -->
    <select [(ngModel)]="newEvent.status" class="custom-select">
      <option value="">Select Status</option>
      <option value="Upcoming">Upcoming</option>
      <option value="Ongoing">Ongoing</option>
      <option value="Completed">Completed</option>
    </select>

    <!-- ✅ USING SELECT -->
    <select [(ngModel)]="newEvent.organization" class="custom-select">
      <option value="">Select Organization</option>
      <option *ngFor="let org of organizations" [value]="org.name">
        {{ org.name }}
      </option>
    </select>

    <button pButton
            label="Add Event"
            icon="pi pi-check"
            class="add-btn"
            (click)="addEvent()">
    </button>

  </div>

  <!-- LIST -->
  <div *ngIf="viewMode === 'list'" class="list-card">

    <div class="list-header">
      <h2>Event List</h2>
    </div>

    <!-- SEARCH -->
    <div class="search-wrapper">
    <i class="pi pi-search"></i>
    <input
      type="text"
      [(ngModel)]="searchText"
      (input)="searchEvents()"
      placeholder="Search events..."
    />
  </div>

    <!-- TABLE -->
    <p-table
      [value]="filteredEvents"
      [paginator]="true"
      [rows]="8"
      [rowsPerPageOptions]="[5,10,20]"
      responsiveLayout="scroll">

      <!-- HEADER -->
      <ng-template pTemplate="header">
        <tr>
          <th>Event</th>
          <th>Date</th>
          <th>Location</th>
          <th>Status</th>
          <th>Organization</th>
          <th *ngIf="isAdmin">Action</th>
        </tr>
      </ng-template>

      <!-- BODY -->
 <!-- BODY -->
<ng-template pTemplate="body" let-event>
  <tr [class.editing-row]="editingId === event.id">

    <!-- NAME -->
    <td>
      <input *ngIf="editingId === event.id"
             pInputText
             class="edit-input"
             [(ngModel)]="event.name">

      <span *ngIf="editingId !== event.id">
        {{ event.name }}
      </span>
    </td>

    <!-- DATE -->
    <td>
      <input *ngIf="editingId === event.id"
             type="date"
             pInputText
             class="edit-input"
             [(ngModel)]="event.date">

      <span *ngIf="editingId !== event.id">
        {{ event.date }}
      </span>
    </td>

    <!-- LOCATION -->
    <td>
      <input *ngIf="editingId === event.id"
             pInputText
             class="edit-input"
             [(ngModel)]="event.location">

      <span *ngIf="editingId !== event.id">
        {{ event.location }}
      </span>
    </td>

    <!-- STATUS -->
    <td>

      <!-- EDIT MODE -->
      <select *ngIf="editingId === event.id"
              [(ngModel)]="event.status"
              class="edit-select">

        <option value="Upcoming">Upcoming</option>
        <option value="Ongoing">Ongoing</option>
        <option value="Completed">Completed</option>

      </select>

      <!-- VIEW MODE -->
      <p-tag *ngIf="editingId !== event.id"
        [value]="getEventStatus(event.date, event.status)"
        [severity]="
          getEventStatus(event.date, event.status) === 'Upcoming' ? 'info' :
          getEventStatus(event.date, event.status) === 'Ongoing' ? 'warn' :
          'success'
        ">
      </p-tag>

    </td>

    <!-- ORGANIZATION -->
    <td>
      <input *ngIf="editingId === event.id"
             pInputText
             class="edit-input"
             [(ngModel)]="event.organization">

      <span *ngIf="editingId !== event.id">
        {{ event.organization }}
      </span>
    </td>

    <!-- ACTION -->
    <td *ngIf="isAdmin" class="actions">

  <!-- EDIT MODE -->
  <ng-container *ngIf="editingId === event.id">

    <button pButton
      label="Save"
      icon="pi pi-check"
      class="p-button-success"
      (click)="saveEvent(event)">
    </button>

    <button pButton
      label="Cancel"
      icon="pi pi-times"
      class="p-button-text"
      (click)="cancelEdit()">
    </button>

  </ng-container>

  <!-- VIEW MODE -->
  <ng-container *ngIf="editingId !== event.id">

    <button pButton
      icon="pi pi-pencil"
      class="p-button-text edit-btn"
      (click)="editEvent(event)">
    </button>

    <button pButton
      icon="pi pi-trash"
      class="p-button-text delete-btn"
      (click)="deleteEvent(event.id)">
    </button>

  </ng-container>

</td>

  </tr>
</ng-template>
    </p-table>

  </div>

</p-card>
