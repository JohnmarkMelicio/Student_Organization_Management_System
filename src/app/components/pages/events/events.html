<div class="event-container">

  <div class="top-toggle">

    <button
      *ngIf="isAdmin"
      [class.active]="viewMode === 'create'"
      (click)="viewMode='create'">
      Create Event
    </button>

    <button
      [class.active]="viewMode === 'list'"
      (click)="viewMode='list'">
      Event List
    </button>

  </div>

  <!-- ✅ CREATE FORM (NOW MATCHES ATTENDANCE STYLE) -->
  <div *ngIf="viewMode === 'create' && isAdmin" class="event-form">

    <label>Event Name</label>
    <input [(ngModel)]="newEvent.name">

    <label>Date</label>
    <input type="date" [(ngModel)]="newEvent.date">

    <label>Location</label>
    <input [(ngModel)]="newEvent.location">

    <label>Status</label>
    <select [(ngModel)]="newEvent.status">
      <option value="">Select</option>
      <option value="Upcoming">Upcoming</option>
      <option value="Ongoing">Ongoing</option>
      <option value="Completed">Completed</option>
    </select>

    <label>Organization</label>
    <select (change)="selectOrganization($event)">
    <option value="">Select Organization</option>
    <option *ngFor="let org of organizations" [value]="org.name">
      {{ org.name }}
    </option>
  </select>

    <button (click)="addEvent()">Add Event</button>

  </div>

  <!-- ✅ LIST -->
  <div *ngIf="viewMode === 'list'" class="list-card">

    <div class="list-header">
      <h2>Event List</h2>
    </div>

    <input class="search"
           placeholder="Search events..."
           [(ngModel)]="searchText"
           (input)="searchEvents()">

    <table *ngIf="filteredEvents.length">

      <thead>
        <tr>
          <th>Event Name</th>
          <th>Date</th>
          <th>Location</th>
          <th>Status</th>
          <th>Organization</th>
          <th *ngIf="isAdmin">Action</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let event of filteredEvents">

          <td>
            <input *ngIf="editingId === event.id" [(ngModel)]="event.name">
            <span *ngIf="editingId !== event.id">{{ event.name }}</span>
          </td>

          <td>
            <input type="date"
                   *ngIf="editingId === event.id"
                   [(ngModel)]="event.date">
            <span *ngIf="editingId !== event.id">{{ event.date }}</span>
          </td>

          <td>
            <input *ngIf="editingId === event.id"
                   [(ngModel)]="event.location">
            <span *ngIf="editingId !== event.id">{{ event.location }}</span>
          </td>

          <td>
            <select *ngIf="editingId === event.id"
                    [(ngModel)]="event.status">
              <option value="Upcoming">Upcoming</option>
              <option value="Ongoing">Ongoing</option>
              <option value="Completed">Completed</option>
            </select>

            <span *ngIf="editingId !== event.id"
              class="status"
              [ngClass]="{
                'upcoming': getEventStatus(event.date, event.status) === 'Upcoming',
                'ongoing': getEventStatus(event.date, event.status) === 'Ongoing',
                'completed': getEventStatus(event.date, event.status) === 'Completed'
              }">

              {{ getEventStatus(event.date, event.status) }}

            </span>
          </td>

          <td>
            <input *ngIf="editingId === event.id"
                   [(ngModel)]="event.organization">
            <span *ngIf="editingId !== event.id">
              {{ event.organization }}
            </span>
          </td>

          <td *ngIf="isAdmin">

          <button class="btn edit-btn"
                  *ngIf="editingId !== event.id"
                  (click)="editEvent(event)">
            Edit
          </button>

          <button class="btn save-btn"
                  *ngIf="editingId === event.id"
                  (click)="saveEvent(event)">
            Save
          </button>

          <button class="btn delete-btn"
                  *ngIf="editingId !== event.id"
                  (click)="deleteEvent(event.id)">
            Delete
          </button>

          <button class="btn cancel-btn"
          *ngIf="editingId === event.id"
          (click)="cancelEdit()">
            Cancel
          </button>

        </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
