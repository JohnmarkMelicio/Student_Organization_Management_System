<div class="sidebar">

  <!-- HEADER -->
  <div class="sidebar-header">
    <div class="logo-box">
      <img src="/images/usglogo.jpg" alt="USG Logo">
    </div>
  </div>

  <!-- MENU -->
  <nav class="menu">

    <a routerLink="/home/dashboard"
       routerLinkActive="active"
       class="menu-item">
      <i class="pi pi-chart-bar icon"></i>
      <span>Dashboard</span>
    </a>

    <a routerLink="/home/events"
       routerLinkActive="active"
       class="menu-item">
      <i class="pi pi-calendar icon"></i>
      <span>Events</span>
    </a>

    <a routerLink="/home/attendance"
       routerLinkActive="active"
       class="menu-item">
      <i class="pi pi-check-square icon"></i>
      <span>Attendance</span>
    </a>

    <a routerLink="/home/payments"
       routerLinkActive="active"
       class="menu-item">
      <i class="pi pi-credit-card icon"></i>
      <span>Payments</span>
    </a>

    <a routerLink="/home/organization"
       routerLinkActive="active"
       class="menu-item">
      <i class="pi pi-building icon"></i>
      <span>Organization</span>
    </a>

    <a *ngIf="isAdmin"
       routerLink="/home/admin-create-account"
       routerLinkActive="active"
       class="menu-item">
      <i class="pi pi-user-plus icon"></i>
      <span>Account Management</span>
    </a>

  </nav>

</div>
