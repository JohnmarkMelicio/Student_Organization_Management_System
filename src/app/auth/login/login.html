<div class="login-container">

  <!-- LEFT -->
  <div class="login-left">

    <div class="glass-card">

      <div class="logo-wrapper">
        <img src="/images/USTPlogo.png" class="ustp-logo">
      </div>

      <h2>Welcome Back !</h2>
      <p class="subtitle">Login to your account</p>

      <form (ngSubmit)="login()">

        <!-- EMAIL -->
        <div class="field floating" [class.filled]="studentID">
          <input
            pInputText
            type="text"
            [(ngModel)]="studentID"
            name="studentID"
            required
            placeholder=" "
          />
          <label>Admin Email or Student ID</label>
        </div>

        <!-- PASSWORD -->
        <div class="field floating" [class.filled]="password">

        <div class="password-wrapper">
          <input
            pInputText
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder=" "
            required
          />

          <i
            class="pi"
            [ngClass]="showPassword ? 'pi-eye' : 'pi-eye-slash'"
            (click)="togglePassword()"
          ></i>
        </div>

        <label>Password</label>

      </div>

        <!-- OPTIONS -->
        <div class="options">

          <div class="remember">
            <p-checkbox [(ngModel)]="rememberMe" name="rememberMe" binary="true"></p-checkbox>
            <span>Remember me</span>
          </div>

          <a href="#">Forgot?</a>

        </div>

        <!-- BUTTON -->
        <button
          pButton
          type="submit"
          class="login-btn"
          [disabled]="loading"
        >
          <span *ngIf="!loading">Login</span>

          <p-progressSpinner
            *ngIf="loading"
            strokeWidth="4"
            styleClass="btn-spinner"
          ></p-progressSpinner>
        </button>

      </form>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="login-right"></div>

</div>
